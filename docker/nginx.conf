server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets: long cache, immutable
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Other common static files
  location = /robots.txt { try_files $uri =404; }
  location = /sitemap.xml { try_files $uri =404; }

  # App routes:
  # - If a real file exists, serve it
  # - If a directory exists (e.g. /en/blog/2026/01/post/), serve its index.html
  # - Otherwise fall back to /index.html so React Router can handle it
  location / {
    try_files $uri $uri/ /index.html;
  }
}
