<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Happyuky7</title>
    <meta name="description" content="ウェブサイト、ブログ、プロジェクトなど。GitHub: https://github.com/Happyuky7" />
    <meta name="theme-color" content="#27F59F" />
    <meta name="robots" content="noindex,follow" />

    <link rel="icon" type="image/png" href="/assets/img/logo.png" />

    <!-- Canonical: prefer /ja/ (jp is a legacy alias) -->
    <link rel="canonical" href="https://happyuky7.com/ja/" />

    <script>
      // Legacy alias: redirect /jp/* to /ja/*
      (function () {
        try {
          var to = window.location.pathname.replace(/^\/jp(?=\/|$)/, '/ja');
          if (to !== window.location.pathname) {
            window.location.replace(to + window.location.search + window.location.hash);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/ja/" />
      <a href="/ja/">Go to /ja/</a>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
