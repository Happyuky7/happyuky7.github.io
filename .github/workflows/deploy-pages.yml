name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deploy env
        shell: bash
        run: |
          if [ -f CNAME ]; then
            CNAME=$(tr -d '\r\n' < CNAME)
            echo "VITE_BASE=/" >> $GITHUB_ENV
            echo "SITE_URL=https://$CNAME" >> $GITHUB_ENV
            echo "VITE_SITE_URL=https://$CNAME" >> $GITHUB_ENV
            echo "Using custom domain (root CNAME): $CNAME"
          elif [ -f public/CNAME ]; then
            CNAME=$(tr -d '\r\n' < public/CNAME)
            echo "VITE_BASE=/" >> $GITHUB_ENV
            echo "SITE_URL=https://$CNAME" >> $GITHUB_ENV
            echo "VITE_SITE_URL=https://$CNAME" >> $GITHUB_ENV
            echo "Using custom domain: $CNAME"
          elif [[ '${{ github.event.repository.name }}' == *.github.io ]]; then
            REPO_NAME='${{ github.event.repository.name }}'
            echo "VITE_BASE=/" >> $GITHUB_ENV
            echo "SITE_URL=https://$REPO_NAME" >> $GITHUB_ENV
            echo "VITE_SITE_URL=https://$REPO_NAME" >> $GITHUB_ENV
            echo "Using user/org pages: $REPO_NAME"
          else
            REPO_NAME='${{ github.event.repository.name }}'
            OWNER='${{ github.repository_owner }}'
            echo "VITE_BASE=/$REPO_NAME/" >> $GITHUB_ENV
            echo "SITE_URL=https://$OWNER.github.io/$REPO_NAME" >> $GITHUB_ENV
            echo "VITE_SITE_URL=https://$OWNER.github.io/$REPO_NAME" >> $GITHUB_ENV
            echo "Using repo pages base: /$REPO_NAME/"
          fi

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
